<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Hub de Suivi Universel</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; padding: 0; }
        body { background: #f8fafc; color: #0f172a; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        
        /* Modales */
        #topBanner { position: fixed; top: 0; width: 100%; background: #fef3c7; padding: 15px; text-align: center; font-size: 14px; border-bottom: 2px solid #fde68a; z-index: 1000; display: none; }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; z-index: 2000; justify-content: center; align-items: center; }
        .modal { background: white; padding: 30px; border-radius: 16px; width: 90%; max-width: 400px; text-align: center; }
        
        /* Reste de ton CSS */
        .setup-screen { background: white; padding: 40px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.04); max-width: 480px; width: 100%; text-align: center; margin-top: 50px; border: 1px solid #e2e8f0; }
        .main-app { max-width: 1250px; width: 100%; display: none; flex-direction: column; gap: 20px; margin-top: 20px; }
        .input-field { width: 100%; padding: 14px; border: 2px solid #e2e8f0; border-radius: 10px; margin-bottom: 15px; }
        .btn { background: #38bdf8; color: white; border: none; padding: 14px 24px; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="topBanner">
        Ceci est votre version hébergée. 
        <span id="keyStatus">Détection clé : </span>
        <button onclick="closeBanner()">OK</button>
    </div>

    <div id="overlay">
        <div class="modal">
            <p>Voulez-vous que je vous remontre ce message à la prochaine visite ?</p>
            <button onclick="hideOverlay(true)">Oui</button>
            <button onclick="hideOverlay(false)">Non</button>
        </div>
    </div>

    <div id="setupScreen" class="setup-screen">
        <h2>Configuration</h2>
        <input type="text" id="setupInput" class="input-field" placeholder="Numéro de suivi">
        <button class="btn" onclick="saveConfiguration()">Localiser</button>
    </div>

    <div id="mainApp" class="main-app">
        <!-- Dashboard content -->
        <button onclick="resetConfiguration()">Retour</button>
    </div>

    <script>
        const TRACK123_KEY = ""; // Laissez vide pour GitHub

        function checkAPI() {
            const status = document.getElementById("keyStatus");
            if (!TRACK123_KEY) {
                status.innerText = "❌ Aucune clé API détectée.";
                return false;
            } else {
                status.innerText = "✅ Clé API détectée.";
                return true;
            }
        }

        function closeBanner() {
            document.getElementById("topBanner").style.display = "none";
            if (!localStorage.getItem("hide_modal")) {
                document.getElementById("overlay").style.display = "flex";
            }
        }

        function hideOverlay(showAgain) {
            if (!showAgain) localStorage.setItem("hide_modal", "true");
            document.getElementById("overlay").style.display = "none";
        }

        window.onload = () => {
            document.getElementById("topBanner").style.display = "block";
            checkAPI();
            // ... reste de ta logique ...
        };

        function saveConfiguration() { /* ta logique */ }
        function resetConfiguration() { localStorage.removeItem("universal_tracking_number"); location.reload(); }
    </script>
</body>
</html>
